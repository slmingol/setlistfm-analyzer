name: Weekly Tour Check

on:
  schedule:
    - cron: '0 12 * * 1'   # every Monday at noon UTC
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  check-tours:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tour checker
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}
          SETLISTFM_USERNAME: ${{ secrets.SETLISTFM_USERNAME }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python check_tours.py

      - name: Commit planning list
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add planning_list.md planning_list.json
          git diff --cached --quiet || git commit -m "chore: weekly tour update $(date -u +%Y-%m-%d)"
          git push
