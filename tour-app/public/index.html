<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tour Planner · setlist.fm</title>
<style>
  :root {
    --bg:#0d0d1a; --surface:#13132a; --card:#1a1a35;
    --border:#2a2a50; --text:#e0e0f0; --muted:#7a7aaa;
    --green:#00c853; --blue:#42a5f5; --orange:#ff9800;
    --purple:#ab47bc; --red:#ef5350;
    --accent:#7c4dff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}

  .hero{background:linear-gradient(135deg,#1a0533 0%,#0d0d1a 100%);padding:1.5rem 0;border-bottom:1px solid var(--border)}
  .hero h1{font-size:1.4rem;font-weight:700;letter-spacing:.03em}
  .hero p{color:var(--muted);font-size:.82rem;margin-top:.25rem}
  .container{max-width:1200px;margin:0 auto;padding:0 1.25rem}

  .toolbar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;padding:1rem 0}
  .search-box{flex:1;min-width:180px;max-width:280px;background:var(--surface);border:1px solid var(--border);
    border-radius:6px;padding:.45rem .75rem;color:var(--text);font-size:.85rem;outline:none}
  .search-box:focus{border-color:var(--accent)}
  .filter-group{display:flex;gap:.35rem;flex-wrap:wrap}
  .fbtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);
    border-radius:5px;padding:.35rem .75rem;cursor:pointer;font-size:.78rem;transition:all .15s}
  .fbtn:hover{border-color:var(--accent);color:var(--text)}
  .fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .sync-btn{margin-left:auto;background:var(--accent);border:none;color:#fff;
    border-radius:5px;padding:.4rem .9rem;cursor:pointer;font-size:.78rem;font-weight:600}
  .sync-btn:disabled{opacity:.5;cursor:default}

  .status-bar{display:flex;gap:1.5rem;padding:.6rem 0 1rem;color:var(--muted);font-size:.78rem;flex-wrap:wrap}
  .status-bar strong{color:var(--text)}
  .badge-new{background:#1a3a1a;color:var(--green);border:1px solid #2a5a2a;
    border-radius:4px;padding:.1rem .4rem;font-size:.68rem;font-weight:700;margin-left:.4rem;vertical-align:middle}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:.55rem .75rem;font-size:.72rem;color:var(--muted);
    text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);
    background:var(--surface);cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--text)}
  th.sorted-asc::after{content:' ▲';font-size:.65rem}
  th.sorted-desc::after{content:' ▼';font-size:.65rem}
  td{padding:.55rem .75rem;border-bottom:1px solid #1e1e3a;vertical-align:top}
  tr:hover td{background:rgba(124,77,255,.05)}
  .rank{color:var(--muted);font-size:.8rem;width:50px}
  .artist-name{font-weight:600}
  .genre-tag{display:inline-block;background:var(--surface);border:1px solid var(--border);
    color:var(--muted);border-radius:4px;padding:.1rem .4rem;font-size:.7rem;margin-left:.4rem}
  .dates-cell{font-size:.78rem}
  .event-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.3rem}
  .event-date{color:var(--orange);font-weight:600;white-space:nowrap;min-width:90px}
  .event-loc{color:var(--muted)}
  .event-link{font-size:.72rem}
  .empty{text-align:center;padding:3rem;color:var(--muted)}
  .syncing-msg{color:var(--orange);font-size:.78rem;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1>Tour Planner</h1>
    <p>Top-500 artists you haven't seen yet — with upcoming shows</p>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <input class="search-box" id="search" placeholder="Search artists…" oninput="render()">
    <div class="filter-group" id="genre-filters"></div>
    <button class="sync-btn" id="syncBtn" onclick="triggerSync()">Refresh Now</button>
  </div>

  <div class="status-bar" id="statusBar">Loading…</div>

  <div id="tableWrap"></div>
</div>

<script>
let allArtists = [];
let status = {};
let activeGenre = 'all';
let sortCol = 'rank';
let sortDir = 1;
const NEW_THRESHOLD_HOURS = 72;

async function load() {
  const [artistRes, statusRes] = await Promise.all([
    fetch('/api/artists'),
    fetch('/api/status'),
  ]);
  allArtists = await artistRes.json();
  status = await statusRes.json();
  buildGenreFilters();
  renderStatus();
  render();
}

function isNew(firstSeen) {
  const diff = (Date.now() - new Date(firstSeen + 'Z').getTime()) / 36e5;
  return diff < NEW_THRESHOLD_HOURS;
}

function buildGenreFilters() {
  // genres come from top_artists — we don't have them in the events table,
  // so we'll skip genre filter for now (events only have rank/name)
  // Could be enhanced by joining against top_artists.json on the frontend
}

function renderStatus() {
  const el = document.getElementById('statusBar');
  if (status.syncing) {
    el.innerHTML = `<span class="syncing-msg">Sync in progress…</span>`;
    setTimeout(async () => { status = await (await fetch('/api/status')).json(); renderStatus(); }, 5000);
    return;
  }
  const ls = status.last_sync;
  const lastSyncStr = ls
    ? new Date(ls.finished_at + 'Z').toLocaleString()
    : 'Never';
  el.innerHTML = `
    <span><strong>${status.artist_count}</strong> artists with dates</span>
    <span><strong>${status.event_count}</strong> upcoming shows found</span>
    <span>Last sync: <strong>${lastSyncStr}</strong></span>
  `;
  document.getElementById('syncBtn').disabled = false;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = allArtists.filter(a => !q || a.name.toLowerCase().includes(q));

  // sort
  rows = [...rows].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'next_date') {
      va = a.events[0]?.date ?? 'z';
      vb = b.events[0]?.date ?? 'z';
    }
    if (sortCol === 'rank') { va = a.rank; vb = b.rank; }
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML =
      `<p class="empty">${allArtists.length ? 'No matches.' : 'No upcoming tours found yet. Try "Refresh Now".'}</p>`;
    return;
  }

  const tbodyRows = rows.map(a => {
    const hasNew = a.events.some(e => isNew(e.first_seen));
    const eventsHtml = a.events.slice(0, 5).map(e => {
      const loc = [e.city, e.state || e.country].filter(Boolean).join(', ');
      const newBadge = isNew(e.first_seen) ? '<span class="badge-new">NEW</span>' : '';
      return `<div class="event-row">
        <span class="event-date">${e.date}${newBadge}</span>
        <span class="event-loc">${loc}${e.venue ? ` · ${e.venue}` : ''}</span>
        ${e.url ? `<a class="event-link" href="${e.url}" target="_blank" rel="noopener">Tickets ↗</a>` : ''}
      </div>`;
    }).join('');
    const more = a.events.length > 5
      ? `<div style="color:var(--muted);font-size:.72rem">+${a.events.length - 5} more dates</div>`
      : '';
    return `<tr>
      <td class="rank">#${a.rank}</td>
      <td><span class="artist-name">${a.name}</span></td>
      <td class="dates-cell">${eventsHtml}${more}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th onclick="setSort('rank')" class="${sortCol==='rank'?'sorted-'+(sortDir>0?'asc':'desc'):''}">Rank</th>
          <th onclick="setSort('name')" class="${sortCol==='name'?'sorted-'+(sortDir>0?'asc':'desc'):''}">Artist</th>
          <th onclick="setSort('next_date')" class="${sortCol==='next_date'?'sorted-'+(sortDir>0?'asc':'desc'):''}">Upcoming Shows</th>
        </tr>
      </thead>
      <tbody>${tbodyRows}</tbody>
    </table>
  `;
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  render();
}

async function triggerSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  await fetch('/api/sync', { method: 'POST' });
  document.getElementById('statusBar').innerHTML = '<span class="syncing-msg">Sync in progress…</span>';
  setTimeout(async () => {
    await load();
  }, 3000);
}

load();
</script>
</body>
</html>
